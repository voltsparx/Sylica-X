name: Silica-X CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Mypy
        run: python -m mypy

      - name: Run CLI smoke
        run: |
          python -m silica_x --about
          python silica-x.py --about

      - name: Run compile smoke
        run: python -m compileall -q core filters modules plugins platforms wordlists silica_x tests silica-x.py

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "twine>=6,<7"

      - name: Build dist
        run: python -m build

      - name: Check dist metadata
        shell: bash
        run: python -m twine check dist/*

      - name: Install built package and validate entrypoints
        shell: bash
        run: |
          python -m venv .venv-package-smoke
          source .venv-package-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          silica-x --about
          python -m silica_x --about

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silica-x-dist
          path: dist/*
          if-no-files-found: error
