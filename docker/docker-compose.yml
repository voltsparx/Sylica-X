# Silica-X Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up silica-x

services:

  silica-x:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: silica-x:latest
    container_name: silica-x
    stdin_open: true
    tty: true
    volumes:
      - ../output:/app/output
    environment:
      - SILICA_X_DOCKER=1
    entrypoint: ["silica-x"]
    command: ["prompt"]

  silica-x-tor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: silica-x:latest
    container_name: silica-x-tor
    stdin_open: true
    tty: true
    volumes:
      - ../output:/app/output
    environment:
      - SILICA_X_DOCKER=1
      - SILICA_X_TOR=1
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        service tor start && sleep 2 && silica-x prompt --tor

  silica-x-full:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: silica-x:latest
    container_name: silica-x-full
    stdin_open: true
    tty: true
    volumes:
      - ../output:/app/output
    environment:
      - SILICA_X_DOCKER=1
      - SILICA_X_TOR=1
    ports:
      - "8000:8000"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        service tor start && sleep 2 && silica-x prompt --tor
